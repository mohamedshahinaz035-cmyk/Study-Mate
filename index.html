 <!DOCTYPE html>
<html  >
<head>
     
    <style>
       
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
            font-family: Arial, sans-serif;
        }
        img {
            align-self: flex-start;
            margin-left: 20px;
            margin-right: 20px;
            margin-bottom: 20px;
        }
        
        
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }
        
        label {
            font-weight: bold;
            font-size: 14px;
            color: #333;
        }
    
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        
        button {
            padding: 12px;
            background-color: #008080;  
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        button:hover { 
            background-color: #005a5a;  
        }
    </style>
</head>
<body>

    <img src="study22.jpeg" width="300">
    
    <h1>Study mate</h1>
    <h2>Sign up</h2>

    <form id="signupForm" onsubmit="redirectToDetails(event)">
        <label>Name / الاسم</label>
        <input type="text" placeholder="Full Name" required>
        
        <label>Email / البريد الإلكتروني</label>
        <input type="email" placeholder="email@example.com" required>
        
        <label>Study System / نظام الدراسة</label>
        <select id="langSelect" required>
            <option value="">Choose / اختر</option>
            <option value="ar">عربي (Arabic)</option>
            <option value="en">لغات (Languages)</option>
        </select>
        
        <button type="submit">Next / التالي</button>
    </form>

    <script>
        function redirectToDetails(event) {
            event.preventDefault(); //  
      
            var selectedLang = document.getElementById("langSelect").value;
            
            // شرط التوجيه
            if (selectedLang === "ar") {
                window.location.href = "details-ar.html";    
            } else if (selectedLang === "en") {
                window.location.href = "details-en.html";   
            }
        }
    </script>
</body>
</html>
