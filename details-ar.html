<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Study mate - البيانات الدراسية</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
            font-family: Arial, sans-serif;
            direction: rtl;  
        }
        img {
             position: absolute; 
             left: 20px;
             margin-bottom: 20px;}

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }
        label { font-weight: bold; font-size: 14px; color: #333; }
        select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; width: 100%; box-sizing: border-box; }
        
         
        .hidden-box { 
            display: none;  
            flex-direction: column;
            gap: 15px;
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border-right: 4px solid #008080;  
            box-sizing: border-box; 
        }
        
        button { padding: 12px; background-color: #008080; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; width: 100%; }
        button:hover { background-color: #005a5a; }
    </style>
</head>
<body>

    <img src=" study22.jpeg" width="300">
    
    <h1>اكمل بياناتك الدراسية</h1>
    <br>

    <form action="home.html">
        <label>نوع التعليم</label>
        <select id="typeSelect" onchange="showGradeBox()">
            <option value="">اختر نوع التعليم</option>
            <option value="general">ثانوي عام</option>
            <option value="bac">بكالوريا</option>
        </select>

        <div id="gradeBox" class="hidden-box">
            <label>السنة الدراسية</label>
            <select id="gradeSelect" onchange="showFinalTracks()">
                <option value="">اختر السنة الدراسية</option>
                <option value="1">الصف الأول الثانوي</option>
                <option value="2">الصف الثاني الثانوي</option>
                <option value="3">الصف الثالث الثانوي</option>
            </select>
        </div>
        

        <div id="bacTracksBox" class="hidden-box">
            <label>مسار البكالوريا</label>
            <select>
                <option value="">اختر المسار</option>
                <option value="track1">المسار الأول </option>
                <option value="track2">المسار الثاني  </option>
                <option value="track3">المسار الثالث </option>
                <option value="track4">المسار الرابع  </option>
            </select>
            <div id="subjectContainer" style="display:none;">
    <label>Subject</label>
    <select id="subject">
        <option value="">Choose Subject</option>
    </select>
</div>

<option value="track1">الطب وعلوم الحياة</option>
<option value="track2">الهندسة وعلوم الحاسب</option>
<option value="track3">الأعمال</option>
<option value="track4">الآداب والفنون</option>
        </div>

        <div id="generalGrade2Box" class="hidden-box">
            <label>الشعبة (الصف الثاني الثانوي)</label>
            <select>
                <option value="">اختر الشعبة</option>
                <option value="science"> علمي  </option>
                
                <option value="arts">أدبي</option>
                
            </select>
        </div>

        <div id="generalGrade3Box" class="hidden-box">
            <label>التخصص (الصف الثالث الثانوي)</label>
            <select>
                <option value="">اختر التخصص</option>
                <option value="bio">علمي  </option>
               
                <option value="arts3">أدبي</option>
            </select>
        </div>

        <button type="submit">إتمام التسجيل</button>
    </form>

    <script>
     
        function showGradeBox() {
            var type = document.getElementById("typeSelect").value;
            
 
            document.getElementById("gradeBox").style.display = "none";
            document.getElementById("bacTracksBox").style.display = "none";
            document.getElementById("generalGrade2Box").style.display = "none";
            document.getElementById("generalGrade3Box").style.display = "none";
            document.getElementById("gradeSelect").value = "";

   
            if (type !== "") { 
                document.getElementById("gradeBox").style.display = "flex"; 
            }
        }

 
        function showFinalTracks() {
            var type = document.getElementById("typeSelect").value;
            var grade = document.getElementById("gradeSelect").value;

          
            document.getElementById("bacTracksBox").style.display = "none";
            document.getElementById("generalGrade2Box").style.display = "none";
            document.getElementById("generalGrade3Box").style.display = "none";

      
            if (grade === "1") return; 

     
            if (type === "bac" && (grade === "2" || grade === "3")) {
                document.getElementById("bacTracksBox").style.display = "flex";
            } 
           
            else if (type === "general") {
                if (grade === "2") { 
                    document.getElementById("generalGrade2Box").style.display = "flex";  
                } else if (grade === "3") { 
                    document.getElementById("generalGrade3Box").style.display = "flex";  
                }
            }
        }
    </script>
</body>
</html>
