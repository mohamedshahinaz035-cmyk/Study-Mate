<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study mate - Academic Info</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
            font-family: Arial, sans-serif;
            direction: ltr; /* اتجاه الشاشة إنجليزي من اليسار لليمن */
        }
        img {
            align-self: flex-start;
            margin-left: 20px;
            margin-right: 20px;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }
        label { font-weight: bold; font-size: 14px; color: #333; }
        select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; width: 100%; box-sizing: border-box; }
        
        .hidden-box { 
            display: none; 
            flex-direction: column; 
            gap: 15px; 
            background-color: #f9f9f9; 
            padding: 15px; 
            border-radius: 6px; 
            border-left: 4px solid #008080; /* الخط التيركواز الجمالي بقى على الشمال عشان يناسب الإنجليزي */
            box-sizing: border-box; 
        }
        
        button { padding: 12px; background-color: #008080; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; width: 100%; }
        button:hover { background-color: #005a5a; }
    </style>
</head>
<body>

    <img src="C:\Users\Elhamd\Desktop\Study Mate\study22.jpeg" width="300">
    
    <h1>Complete Academic Info</h1>
    <br>

    <form action="home.html">
        <label>Education Type</label>
        <select id="typeSelect" onchange="showGradeBox()">
            <option value="">Choose Type</option>
            <option value="general">Thanaweya Amma</option>
            <option value="bac">Baccalaureate</option>
        </select>

        <div id="gradeBox" class="hidden-box">
            <label>Grade</label>
            <select id="gradeSelect" onchange="showFinalTracks()">
                <option value="">Choose Grade</option>
                <option value="1">1st Grade (Senior 1)</option>
                <option value="2">2nd Grade (Senior 2)</option>
                <option value="3">3rd Grade (Senior 3)</option>
            </select>
        </div>

        <div id="bacTracksBox" class="hidden-box">
            <label>Baccalaureate Track</label>
            <select>
                <option value="">Choose Track</option>
                <option value="track1">Track 1 (Subject 1 + Subject 2)</option>
                <option value="track2">Track 2 (Subject 3 + Subject 4)</option>
                <option value="track3">Track 3 (Subject 5 + Subject 6)</option>
                <option value="track4">Track 4 (Subject 7 + Subject 8)</option>
            </select>
        </div>

        <div id="generalGrade2Box" class="hidden-box">
            <label>Branch (2nd Grade)</label>
            <select>
                <option value="">Choose Branch</option>
                <option value="science">Scientific (Almi)</option>
                <option value="arts">Literary (Adabi)</option>
            </select>
        </div>

        <div id="generalGrade3Box" class="hidden-box">
            <label>Specialization (3rd Grade)</label>
            <select>
                <option value="">Choose Specialization</option>
                <option value="bio">Scientific / Biology (Almi Oloum)</option>
                <option value="math">Scientific / Math (Almi Ryada)</option>
                <option value="arts3">Literary (Adabi)</option>
            </select>
        </div>

        <button type="submit">Submit</button>
    </form>

    <script>
        function showGradeBox() {
            var type = document.getElementById("typeSelect").value;
            document.getElementById("gradeBox").style.display = "none";
            document.getElementById("bacTracksBox").style.display = "none";
            document.getElementById("generalGrade2Box").style.display = "none";
            document.getElementById("generalGrade3Box").style.display = "none";
            document.getElementById("gradeSelect").value = "";

            if (type !== "") { document.getElementById("gradeBox").style.display = "flex"; }
        }

        function showFinalTracks() {
            var type = document.getElementById("typeSelect").value;
            var grade = document.getElementById("gradeSelect").value;

            document.getElementById("bacTracksBox").style.display = "none";
            document.getElementById("generalGrade2Box").style.display = "none";
            document.getElementById("generalGrade3Box").style.display = "none";

            if (grade === "1") return; 

            if (type === "bac" && (grade === "2" || grade === "3")) {
                document.getElementById("bacTracksBox").style.display = "flex";
            } else if (type === "general") {
                if (grade === "2") { document.getElementById("generalGrade2Box").style.display = "flex"; }
                else if (grade === "3") { document.getElementById("generalGrade3Box").style.display = "flex"; }
            }
        }
    </script>
</body>
</html>
